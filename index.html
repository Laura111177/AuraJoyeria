<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Joyería | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800">

    <header class="py-12 text-center">
        <h1 class="text-5xl text-amber-700 font-serif">AURA</h1>
        <p class="uppercase tracking-widest text-stone-500 text-sm">Joyería Exclusiva</p>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-20">
        <h2 class="text-3xl font-serif text-center mb-10 text-stone-700 border-b border-amber-200 pb-4">Oro - Collares</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0015.jpg" alt="Collar" class="w-full h-64 object-cover mb-4 rounded">
                <h3 class="font-bold">Cadena Oro 1</h3>
                <p class="text-amber-700 font-semibold">50cm <span class="text-stone-400 mx-1">|</span> 5.8gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0016.jpg" alt="Collar" class="w-full h-64 object-cover mb-4 rounded">
                <h3 class="font-bold">Cadena Oro 2</h3>
                <p class="text-amber-700 font-semibold">55cm <span class="text-stone-400 mx-1">|</span> 5.9gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0017.jpg" alt="Collar" class="w-full h-64 object-cover mb-4 rounded">
                <h3 class="font-bold">Cadena Oro 3</h3>
                <p class="text-amber-700 font-semibold">45cm <span class="text-stone-400 mx-1">|</span> 4.2gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0018.jpg" alt="Collar" class="w-full h-64 object-cover mb-4 rounded">
                <h3 class="font-bold">Cadena Oro 4</h3>
                <p class="text-amber-700 font-semibold">60cm <span class="text-stone-400 mx-1">|</span> 7.5gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0019.jpg" alt="Collar" class="w-full h-64 object-cover mb-4 rounded">
                <h3 class="font-bold">Cadena Oro 5</h3>
                <p class="text-amber-700 font-semibold">50cm <span class="text-stone-400 mx-1">|</span> 6.1gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0020.jpg" alt="Collar" class="w-full h-64 object-cover mb-4 rounded">
                <h3 class="font-bold">Cadena Oro 6</h3>
                <p class="text-amber-700 font-semibold">55cm <span class="text-stone-400 mx-1">|</span> 8.2gr</p>
            </div>

        </div>
    </main>
</body>
</html>
