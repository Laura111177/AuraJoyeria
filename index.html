<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Joyería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800">

    <!-- Navegación -->
    <nav class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
        <div class="text-xl font-serif text-amber-700">AURA</div>
        <div class="space-x-6 text-sm uppercase tracking-widest text-stone-600">
            <a href="#" class="hover:text-amber-700">Inicio</a>
            <a href="#plata" class="hover:text-amber-700">Plata</a>
            <a href="#oro" class="hover:text-amber-700">Oro</a>
        </div>
    </nav>

    <!-- Encabezado -->
    <header class="py-12 text-center">
        <h1 class="text-5xl text-amber-700 font-serif">AURA</h1>
        <p class="uppercase tracking-widest text-stone-500 text-sm">Joyería Exclusiva</p>
    </header>

    <!-- Catálogo -->
    <main class="max-w-5xl mx-auto px-6 pb-20">
        
        <h2 id="oro" class="text-3xl font-serif text-center mb-10 text-stone-700 border-b border-amber-200 pb-4">Oro - Collares</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0015.jpg" class="w-full h-64 object-cover mb-4 rounded" alt="Cadena de Oro">
                <h3 class="font-bold">Cadena Clásica</h3>
                <p class="text-amber-700 font-semibold">50cm | 5.8gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0016.jpg" class="w-full h-64 object-cover mb-4 rounded" alt="Cadena de Oro">
                <h3 class="font-bold">Cadena Elegante</h3>
                <p class="text-amber-700 font-semibold">55cm | 5.9gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0017.jpg" class="w-full h-64 object-cover mb-4 rounded" alt="Cadena de Oro">
                <h3 class="font-bold">Estilo Minimalista</h3>
                <p class="text-amber-700 font-semibold">45cm | 4.2gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0018.jpg" class="w-full h-64 object-cover mb-4 rounded" alt="Cadena de Oro">
                <h3 class="font-bold">Cadena Eslabones</h3>
                <p class="text-amber-700 font-semibold">60cm | 7.5gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0019.jpg" class="w-full h-64 object-cover mb-4 rounded" alt="Cadena de Oro">
                <h3 class="font-bold">Diseño Especial</h3>
                <p class="text-amber-700 font-semibold">50cm | 6.1gr</p>
            </div>

            <div class="bg-white p-4 rounded shadow-sm border border-stone-100">
                <img src="IMG-20260624-WA0020.jpg" class="w-full h-64 object-cover mb-4 rounded" alt="Cadena de Oro">
                <h3 class="font-bold">Cadena de Lujo</h3>
                <p class="text-amber-700 font-semibold">55cm | 8.2gr</p>
            </div>

        </div>

        <h2 id="plata" class="text-3xl font-serif text-center mt-20 mb-10 text-stone-700 border-b border-stone-200 pb-4">Plata</h2>
        <div class="text-center text-stone-500">
            Próximamente colección de plata.
        </div>

    </main>
</body>
</html>
